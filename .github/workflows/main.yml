name: Windows-12hr-RDP

on:
  workflow_dispatch:    # only manual trigger

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 720    # 12 hours max

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          $username = "runneradmin"
          $password = "Password123!"

          # Create user only if missing
          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
            net user $username $password /add
          } else {
            Write-Host "User $username already exists, skipping creation."
          }

          # Add user to Remote Desktop Users group (if not already a member)
          $group = "Remote Desktop Users"
          $members = Get-LocalGroupMember -Group $group | Where-Object { $_.Name -eq "$env:COMPUTERNAME\$username" }
          if (-not $members) {
            Add-LocalGroupMember -Group $group -Member $username
          } else {
            Write-Host "User already in $group, skipping."
          }

          # Enable RDP (if not already enabled)
          $rdpKey = "HKLM:\System\CurrentControlSet\Control\Terminal Server"
          if ((Get-ItemProperty -Path $rdpKey -Name "fDenyTSConnections").fDenyTSConnections -ne 0) {
            Set-ItemProperty -Path $rdpKey -Name "fDenyTSConnections" -Value 0
            Write-Host "RDP enabled."
          } else {
            Write-Host "RDP already enabled."
          }

          # Allow RDP through Windows Firewall
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

      - name: Download ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath . -Force

      - name: Start ngrok (background)
        shell: pwsh
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTHTOKEN }}   # store your token in GitHub secrets
        run: |
          # Authenticate ngrok
          .\ngrok.exe authtoken $env:NGROK_AUTH_TOKEN

          # Start ngrok tunnel to port 3389 (RDP) in the background
          Start-Process -NoNewWindow .\ngrok.exe -ArgumentList "tcp 3389"

          # Give ngrok a few seconds to establish the tunnel
          Start-Sleep -Seconds 5

          # Query ngrok's local API to get the public URL
          $tries = 0
          $maxTries = 10
          while ($tries -lt $maxTries) {
            try {
              $api = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction Stop
              $url = $api.tunnels[0].public_url
              Write-Host "========================================="
              Write-Host "RDP tunnel is ready: $url"
              Write-Host "Connect using any RDP client."
              Write-Host "Username: runneradmin"
              Write-Host "Password: Password123!"
              Write-Host "========================================="
              break
            } catch {
              $tries++
              Write-Host "Waiting for ngrok API... ($tries/$maxTries)"
              Start-Sleep -Seconds 3
            }
          }

      - name: Keep job alive (12 hours)
        shell: pwsh
        run: |
          Write-Host "Job will stay alive for up to 12 hours. Press Ctrl+C to stop manually."
          while ($true) {
            Start-Sleep -Seconds 300   # sleep 5 minutes
          }
