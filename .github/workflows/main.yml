name: Windows-12hr-RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 720    # 12 hours

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          $username = "runneradmin"
          $password = "Password123!"
          
          # Create user if missing
          if (-not (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
            net user $username $password /add
            Write-Host "User $username created."
          } else {
            Write-Host "User $username already exists."
          }
          
          # Add to Remote Desktop Users group if needed
          $group = "Remote Desktop Users"
          $members = Get-LocalGroupMember -Group $group | Where-Object { $_.Name -eq "$env:COMPUTERNAME\$username" }
          if (-not $members) {
            Add-LocalGroupMember -Group $group -Member $username
            Write-Host "Added $username to $group."
          } else {
            Write-Host "$username is already in $group."
          }
          
          # Enable RDP in registry
          $rdpKey = "HKLM:\System\CurrentControlSet\Control\Terminal Server"
          if ((Get-ItemProperty -Path $rdpKey -Name "fDenyTSConnections").fDenyTSConnections -ne 0) {
            Set-ItemProperty -Path $rdpKey -Name "fDenyTSConnections" -Value 0
            Write-Host "RDP enabled in registry."
          } else {
            Write-Host "RDP already enabled in registry."
          }
          
          # Allow RDP through firewall
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          Write-Host "Firewall rule enabled."

      - name: Expose RDP via ngrok
        shell: pwsh
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # Download ngrok
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path "ngrok.zip" -DestinationPath "."
          
          # Authenticate with token from secret
          .\ngrok.exe authtoken $env:NGROK_TOKEN
          
          # Start ngrok tunnel on port 3389 in background
          Start-Process -NoNewWindow -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389"
          
          # Wait for tunnel to establish
          Start-Sleep -Seconds 8
          
          # Get public address from ngrok API
          $response = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $publicUrl = $response.tunnels[0].public_url
          
          Write-Host "========================================="
          Write-Host "🌐 RDP Connection Details (via ngrok)"
          Write-Host "========================================="
          Write-Host "Connect to: $publicUrl"
          Write-Host "Username:   runneradmin"
          Write-Host "Password:   Password123!"
          Write-Host "========================================="
          Write-Host "This tunnel is active for up to 12 hours."
          Write-Host "ngrok free tier limits: 1 tunnel, 40 connections/min."

      - name: Keep ngrok alive (optional)
        shell: pwsh
        run: |
          Write-Host "Keeping runner alive for 12 hours. RDP remains accessible via ngrok."
          Write-Host "Press Ctrl+C in GitHub Actions log to stop early."
          Start-Sleep -Seconds 43200
